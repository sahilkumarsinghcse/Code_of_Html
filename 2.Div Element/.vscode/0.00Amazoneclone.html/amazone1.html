<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amazon Clone</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#eaeded;
    }

    /* Navbar */
    .navbar{
      background:#131921;
      color:white;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 20px;
      flex-wrap:wrap;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      color:#ff9900;
    }

    .search-bar{
      display:flex;
      flex:1;
      margin:10px 20px;
      max-width:700px;
    }

    .search-bar input{
      width:100%;
      padding:10px;
      border:none;
      outline:none;
      font-size:16px;
    }

    .search-bar button{
      padding:10px 20px;
      background:#febd69;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    .nav-links{
      display:flex;
      gap:20px;
      font-size:14px;
    }

    .nav-links div{
      cursor:pointer;
    }

    /* Hero Section */
    .hero{
      background:url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1200&auto=format&fit=crop') center/cover;
      height:350px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      color:black;
    }

    .hero-text{
      background:white;
      padding:15px 20px;
      margin-bottom:25px;
      width:90%;
      text-align:center;
      font-size:18px;
    }

    /* Products */
    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:white;
      padding:15px;
      border-radius:5px;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:0 4px 10px rgba(0,0,0,0.2);
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      margin:10px 0;
    }

    .card h3{
      margin-bottom:10px;
    }

    .price{
      color:#b12704;
      font-size:20px;
      font-weight:bold;
    }

    .btn{
      margin-top:10px;
      padding:10px;
      width:100%;
      border:none;
      background:#ffd814;
      cursor:pointer;
      border-radius:20px;
      font-weight:bold;
    }

    .btn:hover{
      background:#f7ca00;
    }

    /* Footer */
    footer{
      background:#131921;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:20px;
    }

    @media(max-width:768px){
      .navbar{
        flex-direction:column;
      }

      .search-bar{
        width:100%;
        margin:15px 0;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">amazon</div>

    <div class="search-bar">
      <input type="text" placeholder="Search Amazon">
      <button>Search</button>
    </div>

    <div class="nav-links">
      <div>Hello, Sign in</div>
      <div>Returns & Orders</div>
      <div>Cart 🛒</div>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-text">
      Welcome to Amazon Clone - Shop Electronics, Fashion, Mobiles & More
    </div>
  </div>

  <!-- Products -->
  <div class="products">

    <div class="card">
      <h3>Smart Watch</h3>
      <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?q=80&w=800&auto=format&fit=crop" alt="">
      <p class="price">$99</p>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Headphones</h3>
      <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=800&auto=format&fit=crop" alt="">
      <p class="price">$59</p>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Laptop</h3>
      <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?q=80&w=800&auto=format&fit=crop" alt="">
      <p class="price">$799</p>
      <button class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Shoes</h3>
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=800&auto=format&fit=crop" alt="">
      <p class="price">$49</p>
      <button class="btn">Add to Cart</button>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    © 2026 Amazon Clone | Designed with HTML & CSS
  </footer>

</body>
</html>
