<!DOCTYPE html>
<html>
<head>
    <title>Collapsible Table Border</title>

    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h2 {
            margin-top: 20px;
        }

        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            border: 4px solid blue;
        }

        th, td {
            border: 2px solid blue;
            padding: 10px;
            text-align: left;
        }

        th {
            font-size: 24px;
            font-weight: bold;
        }

        td {
            font-size: 20px;
        }
    </style>
</head>

<body>

    <h2>Collapsible Table Border</h2>

    <table>
        <tr>
            <th>Emp Code</th>
            <th>Emp Name</th>
            <th>Job Title</th>
            <th>Salary(LPA)</th>
        </tr>

        <tr>
            <td>911</td>
            <td>Zoya Shaikh</td>
            <td>Developer</td>
            <td>3.6</td>
        </tr>

        <tr>
            <td>912</td>
            <td>Lisa Dev</td>
            <td>Tester</td>
            <td>2.8</td>
        </tr>

        <tr>
            <td>913</td>
            <td>Deepak Jadeja</td>
            <td>Digital Marketing</td>
            <td>5.2</td>
        </tr>

        <tr>
            <td>914</td>
            <td>Aditi Yewale</td>
            <td>Developer</td>
            <td>4</td>
        </tr>

        <tr>
            <td>915</td>
            <td>Simren Rao</td>
            <td>HR</td>
            <td>5.6</td>
        </tr>
    </table>

</body>
</html>
